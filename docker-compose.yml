version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: etl_postgres
    environment:
      POSTGRES_USER: etluser
      POSTGRES_PASSWORD: etlpassword
      POSTGRES_DB: etldb
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - etl_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "etluser", "-d", "etldb"]
      interval: 5s
      retries: 5

  airflow:
    image: apache/airflow:2.7.2-python3.11
    container_name: etl_airflow
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://etluser:etlpassword@postgres:5432/etldb
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__WEBSERVER__SECRET_KEY: 'etl-secret-key-123'
      GROQ_API_KEY: ${GROQ_API_KEY}
      POSTGRES_HOST: postgres 
      POSTGRES_PORT: 5432
    volumes:
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
      - ./data:/opt/airflow/data
      - ./logs:/opt/airflow/logs
    ports:
      - "8080:8080"
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        pip install groq psycopg2-binary --quiet
        airflow db init
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com
        airflow webserver &
        airflow scheduler

volumes:
  etl_postgres_data:
    name: etl_postgres_data